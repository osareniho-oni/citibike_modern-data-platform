name: nyc_citibike_analytics

profile: nyc_citibike_analytics

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"
  - "dbt_internal_packages"

packages-install-path: "dbt_internal_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  nyc_citibike_analytics:
    +schema: raw

models:
  nyc_citibike_analytics:
    # Materialize staging models as views, and marts as tables
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: staging
      +materialized: view
    marts:
      +schema: marts
      +materialized: table
    dashboards:
      +schema: citibike_dashboards
      +materialized: view
      +tags: ['dashboard']
