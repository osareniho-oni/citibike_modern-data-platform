id: nyc_bikes_gcs_to_bq
namespace: samples.nyc
description: Load a single month of CitiBike Parquet data from GCS to BigQuery.

inputs:
  - id: year_month
    type: STRING

tasks:

  - id: load_to_bigquery
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    from:
      - "gs://{{ kv('GCP_BUCKET_NAME') }}/nyc_bikes/parquet/year={{ inputs.year_month | slice(0,4) }}/month={{ inputs.year_month | slice(5,7) }}/*.parquet"
    projectId: "{{ kv('GCP_PROJECT_ID') }}"
    destinationTable: "{{ kv('GCP_PROJECT_ID') }}.{{ kv('GCP_DATASET') }}.citibike_trips"
    format: PARQUET
    writeDisposition: WRITE_APPEND
    createDisposition: CREATE_IF_NEEDED
    schemaUpdateOptions:
      - ALLOW_FIELD_ADDITION
      - ALLOW_FIELD_RELAXATION
    timePartitioningType: MONTH
    timePartitioningField: started_at
    autodetect: true
